<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Person Management System</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    nav {
      background: #111827;
      padding: 16px 32px;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .page {
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #6b7280;
      color: white;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .link-button {
      display: inline-block;
      background: #111827;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
    }

    .link-button:hover {
      background: #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      background: white;
      border-radius: 10px;
    }

    th,
    td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #6b7280;
    }

    .edit-row input {
      width: 100%;
    }
  </style>
</head>

<body>
  <nav>
    <a href="/" onclick="navigate(event, '/')">Register</a>
    <a href="/people" onclick="navigate(event, '/people')">People List</a>
  </nav>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const API_URL = "http://localhost:5000/api/people";

    function navigate(event, path) {
      event.preventDefault();
      window.history.pushState({}, "", path);
      renderApp();
    }

    window.addEventListener("popstate", renderApp);

    function RegisterPage() {
      const [fullName, setFullName] = React.useState("");
      const [email, setEmail] = React.useState("");
      const [message, setMessage] = React.useState("");
      const [error, setError] = React.useState("");

      const validateEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setMessage("");
        setError("");

        if (!fullName.trim()) {
          setError("Full Name cannot be empty.");
          return;
        }

        if (!email.trim()) {
          setError("Email cannot be empty.");
          return;
        }

        if (!validateEmail(email)) {
          setError("Email format is invalid.");
          return;
        }

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              full_name: fullName,
              email: email
            })
          });

          const data = await response.json();

          if (response.ok) {
            setMessage("Person added successfully.");
            setFullName("");
            setEmail("");
          } else {
            setError(data.error || "Something went wrong.");
          }
        } catch (err) {
          setError("Server connection error.");
        }
      };

      return (
        <div className="page">
          <div className="card">
            <div className="top-row">
              <div>
                <h1>Register Person</h1>
                <div className="subtitle">
                  Add a new person to the system using the form below.
                </div>
              </div>
              <a href="/people" className="link-button" onClick={(e) => navigate(e, "/people")}>
                View People List
              </a>
            </div>

            <form onSubmit={handleSubmit}>
              <input
                type="text"
                placeholder="Full Name"
                value={fullName}
                onChange={(e) => setFullName(e.target.value)}
              />
              <input
                type="email"
                placeholder="Email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
              <button className="btn-primary" type="submit">Add Person</button>
            </form>

            {message && <div className="message success">{message}</div>}
            {error && <div className="message error">{error}</div>}
          </div>
        </div>
      );
    }

    function PeoplePage() {
      const [people, setPeople] = React.useState([]);
      const [error, setError] = React.useState("");
      const [message, setMessage] = React.useState("");
      const [editingId, setEditingId] = React.useState(null);
      const [editName, setEditName] = React.useState("");
      const [editEmail, setEditEmail] = React.useState("");

      const validateEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);

      const fetchPeople = async () => {
        try {
          const response = await fetch(API_URL);
          const data = await response.json();
          setPeople(data);
        } catch (err) {
          setError("Could not fetch people.");
        }
      };

      React.useEffect(() => {
        fetchPeople();
      }, []);

      const handleDelete = async (id) => {
        setError("");
        setMessage("");

        const confirmed = window.confirm("Are you sure you want to delete this person?");
        if (!confirmed) return;

        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
          });

          if (response.ok) {
            setMessage("Person deleted successfully.");
            fetchPeople();
          } else {
            setError("Delete failed.");
          }
        } catch (err) {
          setError("Server connection error.");
        }
      };

      const startEdit = (person) => {
        setEditingId(person.id);
        setEditName(person.full_name);
        setEditEmail(person.email);
        setError("");
        setMessage("");
      };

      const cancelEdit = () => {
        setEditingId(null);
        setEditName("");
        setEditEmail("");
      };

      const saveEdit = async (id) => {
        setError("");
        setMessage("");

        if (!editName.trim()) {
          setError("Full Name cannot be empty.");
          return;
        }

        if (!editEmail.trim()) {
          setError("Email cannot be empty.");
          return;
        }

        if (!validateEmail(editEmail)) {
          setError("Email format is invalid.");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              full_name: editName,
              email: editEmail
            })
          });

          const data = await response.json();

          if (response.ok) {
            setMessage("Person updated successfully.");
            setEditingId(null);
            fetchPeople();
          } else {
            setError(data.error || "Update failed.");
          }
        } catch (err) {
          setError("Server connection error.");
        }
      };

      return (
        <div className="page">
          <div className="card">
            <div className="top-row">
              <div>
                <h1>People List</h1>
                <div className="subtitle">
                  View, update, and delete registered people.
                </div>
              </div>
              <a href="/" className="link-button" onClick={(e) => navigate(e, "/")}>
                Add New Person
              </a>
            </div>

            {message && <div className="message success">{message}</div>}
            {error && <div className="message error">{error}</div>}

            {people.length === 0 ? (
              <div className="empty-state">No people found in the system.</div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {people.map((person) => (
                    <tr key={person.id} className={editingId === person.id ? "edit-row" : ""}>
                      <td>{person.id}</td>
                      <td>
                        {editingId === person.id ? (
                          <input
                            value={editName}
                            onChange={(e) => setEditName(e.target.value)}
                          />
                        ) : (
                          person.full_name
                        )}
                      </td>
                      <td>
                        {editingId === person.id ? (
                          <input
                            value={editEmail}
                            onChange={(e) => setEditEmail(e.target.value)}
                          />
                        ) : (
                          person.email
                        )}
                      </td>
                      <td>
                        <div className="actions">
                          {editingId === person.id ? (
                            <>
                              <button className="btn-primary" onClick={() => saveEdit(person.id)}>Save</button>
                              <button className="btn-secondary" onClick={cancelEdit}>Cancel</button>
                            </>
                          ) : (
                            <>
                              <button className="btn-primary" onClick={() => startEdit(person)}>Edit</button>
                              <button className="btn-danger" onClick={() => handleDelete(person.id)}>Delete</button>
                            </>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const path = window.location.pathname;

      if (path === "/people") {
        return <PeoplePage />;
      }

      return <RegisterPage />;
    }

    function renderApp() {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    }

    renderApp();
  </script>
</body>

</html>
