services:
  db:
    image: postgres:16
    container_name: people_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: people_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: people_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: people_db
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: people_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"